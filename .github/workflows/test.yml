name: Test Pipeline

on:
  push:
    branches: [feat/auth-and-data]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate wrangler types
        run: npx wrangler types
        env:
          # wrangler types only generates bindings — no CF credentials needed
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || 'dummy' }}

      - name: Svelte sync
        run: npx svelte-kit sync

      - name: Type check (svelte-check)
        run: npx svelte-check --tsconfig ./tsconfig.json --threshold error
        # outputs check annotations via stderr; GitHub Actions picks them up automatically

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        # --coverage.thresholds.lines=80 enforces 80% line coverage; CI fails if below
        run: >-
          npx vitest run
          --config vitest.workspace.ts
          --project unit
          --coverage
          --coverage.thresholds.lines=80
          --coverage.thresholds.branches=80
          --coverage.thresholds.functions=80
          --coverage.thresholds.statements=80
          --reporter=verbose
          --reporter=github-actions

      - name: Upload unit coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage/
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests with coverage
        # --coverage.thresholds.lines=60 enforces 60% line coverage; CI fails if below
        run: >-
          npx vitest run
          --config vitest.workspace.ts
          --project integration
          --coverage
          --coverage.thresholds.lines=60
          --coverage.thresholds.branches=60
          --coverage.thresholds.functions=60
          --coverage.thresholds.statements=60
          --reporter=verbose
          --reporter=github-actions

      - name: Upload integration coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: coverage/
          retention-days: 7

  component-tests:
    name: Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run component tests with coverage
        # --coverage.thresholds.lines=50 enforces 50% line coverage; CI fails if below
        run: >-
          npx vitest run
          --config vitest.workspace.ts
          --project components
          --coverage
          --coverage.thresholds.lines=50
          --coverage.thresholds.branches=50
          --coverage.thresholds.functions=50
          --coverage.thresholds.statements=50
          --reporter=verbose
          --reporter=github-actions

      - name: Upload component coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-components
          path: coverage/
          retention-days: 7

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: e2e-results/
          retention-days: 7
