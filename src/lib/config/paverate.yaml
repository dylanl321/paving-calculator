# Paverate single source of configuration.
# Every value, spec rate, constant, theme token and label lives here.
# Each spec/constant carries its Validation Matrix ID and verification status
# (see docs/validation-matrix.md). Formulas in formulas.ts read from this file
# by ID -- no magic numbers in code.
#
# status: VERIFIED | FIELD_ESTIMATE | UNVERIFIED | CONFLICT | NA
# tier:   1 Std Spec | 2 Supplemental | 3 Constr. Manual | 4 ROADS | 5 Field card

app:
  name: Paverate
  tagline: In-field asphalt paving calculators

# ---------------------------------------------------------------------------
# Theme tokens (clean, non-invasive: one slate, one yellow accent, semantic
# status colors only). Consumed by app.css via formulas/config loader.
# ---------------------------------------------------------------------------
theme:
  dark:
    bg: '#1b2228'          # app background (dark)
    surface: '#232c34'     # cards / inputs
    surfaceAlt: '#2e3b46'  # slate (logo), headers
    surfaceHover: '#2b353e' # hover state for surfaces
    border: '#37444f'
    text: '#f4f6f7'        # primary text
    textMuted: '#9fb0bd'
    accent: '#f2c037'      # single yellow accent (logo)
    accentText: '#1b2228'  # text on accent
    good: '#3fb27f'        # in spec
    warn: '#e0922f'        # out of range / caution
    bad: '#d8584f'         # blocked / fail
    badRgb: '216, 88, 79'  # bad as rgb triplet for alpha overlays
  light:
    bg: '#f5f1e8'          # warm off-white/cream (not washed out)
    surface: '#ffffff'     # cards / inputs
    surfaceAlt: '#eae4d5'  # warmer alt surface
    surfaceHover: '#f1ecdf' # hover state for surfaces
    border: '#c9bfa8'      # strong border for contrast
    text: '#1a1614'        # strong dark text
    textMuted: '#5a5248'   # muted but still readable
    accent: '#d4a42c'      # darker yellow for light mode
    accentText: '#1a1614'  # dark text on accent
    good: '#2d8f63'        # darker green
    warn: '#c07820'        # darker orange
    bad: '#b8423a'         # darker red
    badRgb: '184, 66, 58'  # bad as rgb triplet for alpha overlays

# ---------------------------------------------------------------------------
# Constants (CONST.*)
# ---------------------------------------------------------------------------
constants:
  SF_PER_SY:
    value: 9
    unit: sq ft / sq yd
    tier: ~
    status: NA
    note: Universal geometry
  LB_PER_TON:
    value: 2000
    unit: lb / ton
    tier: ~
    status: NA
    note: US short ton
  CF_PER_CY:
    value: 27
    unit: cu ft / cu yd
    tier: ~
    status: NA
  WATER_LB_GAL:
    value: 8.34
    unit: lb / gal
    tier: ~
    status: NA
    note: Water at ~60F
  CEMENT_BAG:
    value: 94
    unit: lb / bag
    tier: 1
    status: UNVERIFIED
    note: Std Spec 830 (portland cement) -- confirm bag standard
  TRUCK_LOAD:
    value: 18.5
    unit: tons
    tier: 5
    status: FIELD_ESTIMATE
    note: Fleet rule-of-thumb; user-editable
  SHUTTLE_RETAIN:
    value: 24
    unit: tons
    tier: 5
    status: FIELD_ESTIMATE
    note: Shuttle Buggy retained material
  PAVER_RETAIN:
    value: 14
    unit: tons
    tier: 5
    status: FIELD_ESTIMATE
    note: Paver hopper retained material
  THICK_MULT:
    value: 110
    unit: lbs/SY per in
    tier: 5
    status: FIELD_ESTIMATE
    note: HMA unit-weight rule-of-thumb
  STICK_FACTOR:
    value: 1.25
    unit: x
    tier: 5
    status: FIELD_ESTIMATE
    note: Loose-vs-compacted estimate (updated field standard)
  COMPACTION_TARGET_MIN:
    value: 95
    unit: '% max dry density'
    tier: 1
    status: UNVERIFIED
    note: Project-specific; 95-100% typical

# ---------------------------------------------------------------------------
# Remembered defaults (Job Setup). Pre-filled every job; user-editable.
# ---------------------------------------------------------------------------
defaults:
  roadWidthFt: 12
  truckLoadTons: 18.5
  machine: paver          # paver | shuttle | none
  firstPass: false        # apply machine retention only on first pass
  tackApplication: TACK.FIELD_LEVELING
  wastePct: 0             # 0 | 5 | 10
  courseType: TOLERANCE.INTERMEDIATE_WEARING  # Table 12 spread-rate tolerance class

# ---------------------------------------------------------------------------
# Job site settings UI — labels, hints, and section layout for the settings
# panel. Field keys map to job store properties (location → weather store).
# ---------------------------------------------------------------------------
jobSite:
  wasteOptions: [0, 5, 10]
  sections:
    - id: site
      title: Site Info
      description: Name this job and set where the crew is working. Location drives live weather and GDOT placement checks.
      fields:
        - key: siteName
          label: Job site name
          hint: e.g. "I-85 SB — Exit 42 resurfacing" or "County Rd 12 mill & overlay"
          type: text
        - key: siteDescription
          label: Description / notes
          hint: Project number, mix design, foreman, lane closures, or anything the crew needs to remember.
          type: textarea
        - key: location
          label: Job-site location
          hint: Search for a city or tap GPS. Weather refreshes every 30 min when online; use manual temp override if offline.
          type: location
    - id: weather
      title: Weather & Placement
      description: Live conditions and GDOT Table 4 minimum air temperature for the current lift thickness. Rain forecast covers the next 24 hours.
      fields:
        - key: weatherPanel
          type: weather
    - id: paving
      title: Paving Setup
      description: Shared values for every asphalt calculator on this job. Change once — all cards update.
      fields:
        - key: widthFt
          label: Mat width
          hint: Width of the mat being placed, in feet. Used by spread rate, feet-left, tack, and tonnage.
          unit: ft
          type: number
        - key: thicknessIn
          label: Target lift thickness
          hint: Compacted lift thickness in inches. Sets target spread rate (thickness × 110 lbs/SY) and the Table 4 minimum air temperature.
          unit: in
          type: number
          step: 0.25
        - key: courseType
          label: Course type
          hint: Sets the GDOT Table 12 spread-rate tolerance — base ±55, intermediate/wearing ±27.5, OGFC ±7, PEM ±10 lbs/SY of the target rate.
          type: course
        - key: machineId
          label: Machine
          hint: Paver or shuttle buggy — retained tonnage is subtracted from spread-rate reality checks on the first pass.
          type: machine
        - key: firstPass
          label: First pass
          hint: When checked, spread-rate actual subtracts hopper/buggy retained material (see machine retention in config).
          type: boolean
        - key: truckLoadTons
          label: Truck load size
          hint: Typical load weight for feet-left and tonnage calculators. Default from your fleet rule-of-thumb truck load setting.
          unit: tons
          type: number
    - id: material
      title: Material & Rates
      description: Default tack application and ordering waste factor for tonnage estimates.
      fields:
        - key: tackApplication
          label: Tack application
          hint: Default tack coat type for the Tack Rate calculator. Ranges from GDOT Table 2 / field card.
          type: tack
        - key: wastePct
          label: Ordering waste
          hint: Extra material added to tonnage orders to cover spillage, header waste, and QC samples.
          type: waste

machines:
  - id: paver
    label: Paver
    retainTons: 14         # CONST.PAVER_RETAIN
  - id: shuttle
    label: Shuttle Buggy
    retainTons: 24         # CONST.SHUTTLE_RETAIN
  - id: mtv
    label: MTV
    retainTons: 24         # MTV (Material Transfer Vehicle)
  - id: none
    label: None
    retainTons: 0

# ---------------------------------------------------------------------------
# Weather / placement limits (WEATHER.*)
# Open-Meteo APIs are free, no key required. Used client-side when online.
# ---------------------------------------------------------------------------
weather:
  geocodeUrl: https://geocoding-api.open-meteo.com/v1/search
  forecastUrl: https://api.open-meteo.com/v1/forecast
  refreshMinutes: 30       # re-fetch interval when location is set
  rainWarnIn: 0.01         # trace rain — caution for tack / placement
  rainBlockIn: 0.10        # ~2.5 mm — do not pave or tack
  tempWarnMarginF: 5       # warn when within this many °F of Table 4 minimum
  ogfcMinAirTempF: 60      # Section 400.3.05.E — OGFC / PEM floor
  wetSurfaceBlocked: true  # no placement on wet or frozen surfaces

# ---------------------------------------------------------------------------
# Tack coat rates (TACK.*) -- GDOT Table 2 + field-card ranges
# ---------------------------------------------------------------------------
tack:
  field:
    - id: TACK.FIELD_LEVELING
      label: Leveling
      min: 0.040
      max: 0.060
      unit: gal/SY
      tier: 5
      status: FIELD_ESTIMATE
    - id: TACK.FIELD_TOPPING
      label: Topping
      min: 0.040
      max: 0.060
      unit: gal/SY
      tier: 5
      status: FIELD_ESTIMATE
    - id: TACK.FIELD_OGI
      label: OGI (Open-Graded Interlayer)
      min: 0.060
      max: 0.080
      unit: gal/SY
      tier: 5
      status: FIELD_ESTIMATE
    - id: TACK.FIELD_ROCKCHIP
      label: Rock Chip
      min: 0.085
      max: 0.085
      unit: gal/SY
      tier: 5
      status: FIELD_ESTIMATE
  spec:
    - id: TACK.NEW_AC
      label: New AC to New AC / thin-lift leveling
      min: 0.05
      max: 0.08
      unit: gal/yd2
      tier: 1
      status: UNVERIFIED
    - id: TACK.AGED_LE25RAP
      label: New AC (<=25% RAP) to aged/milled
      min: 0.06
      max: 0.10
      unit: gal/yd2
      tier: 1
      status: UNVERIFIED
    - id: TACK.AGED_GT25RAP
      label: New AC (>25% RAP) to aged/milled
      min: 0.08
      max: 0.12
      unit: gal/yd2
      tier: 1
      status: UNVERIFIED
  notes:
    - id: TACK.OGFC_PEM_RESTRICTION
      text: No anionic/cationic emulsion under OGFC or PEM on interstates / limited-access state routes
      tier: 1
      status: UNVERIFIED

# ---------------------------------------------------------------------------
# Lift thickness vs minimum air temperature (TEMP.*) -- GDOT Table 4
# ---------------------------------------------------------------------------
temperature:
  - id: TEMP.LE_1IN
    maxThicknessIn: 1.0
    minAirTempF: 55
    tier: 1
    status: UNVERIFIED
  - id: TEMP.1_2IN
    maxThicknessIn: 2.0
    minAirTempF: 45
    tier: 1
    status: UNVERIFIED
  - id: TEMP.2_3IN
    maxThicknessIn: 3.0
    minAirTempF: 40
    tier: 1
    status: UNVERIFIED
  - id: TEMP.3_4IN
    maxThicknessIn: 4.0
    minAirTempF: 35
    tier: 1
    status: UNVERIFIED
  - id: TEMP.4_8IN
    maxThicknessIn: 8.0
    minAirTempF: 32
    tier: 1
    status: UNVERIFIED
    note: 32F and rising; base must not be frozen

# ---------------------------------------------------------------------------
# Mix type layer / total thickness (THICK.*) -- GDOT Table 5
# in = inches; rate values are lbs/yd2 (OGFC/PEM)
# ---------------------------------------------------------------------------
mixThickness:
  - id: THICK.SP_25MM
    label: 25 mm Superpave
    minLayerIn: 2.5
    maxLayerIn: 5.0
    maxTotalIn: ~
    tier: 1
    status: UNVERIFIED
  - id: THICK.SP_19MM
    label: 19 mm Superpave
    minLayerIn: 1.75
    maxLayerIn: 3.0
    maxTotalIn: ~
    tier: 1
    status: UNVERIFIED
  - id: THICK.SP_125MM
    label: 12.5 mm Superpave
    minLayerIn: 1.375
    maxLayerIn: 2.5
    maxTotalIn: 8.0
    tier: 1
    status: UNVERIFIED
  - id: THICK.SP_95_T2
    label: 9.5 mm Superpave Type 2
    minLayerIn: 1.125
    maxLayerIn: 1.5
    maxTotalIn: 4.0
    tier: 1
    status: UNVERIFIED
  - id: THICK.SP_95_T1
    label: 9.5 mm Superpave Type 1
    minLayerIn: 0.875
    maxLayerIn: 1.25
    maxTotalIn: 4.0
    tier: 1
    status: UNVERIFIED
  - id: THICK.MIX_475
    label: 4.75 mm Mix
    minLayerIn: 0.75
    maxLayerIn: 1.125
    maxTotalIn: 2.0
    tier: 1
    status: UNVERIFIED
  - id: THICK.SMA_95
    label: 9.5 mm SMA
    minLayerIn: 1.125
    maxLayerIn: 1.5
    maxTotalIn: 4.0
    tier: 1
    status: UNVERIFIED
  - id: THICK.SMA_125
    label: 12.5 mm SMA
    minLayerIn: 1.375
    maxLayerIn: 3.0
    maxTotalIn: 6.0
    tier: 1
    status: UNVERIFIED
  - id: THICK.SMA_19
    label: 19 mm SMA
    minLayerIn: 1.75
    maxLayerIn: 3.0
    maxTotalIn: ~
    tier: 1
    status: UNVERIFIED

# ---------------------------------------------------------------------------
# Spread-rate acceptance tolerance (TOLERANCE.*) -- GDOT Section 400 Table 12
# "Thickness and Spread Rate Tolerance at Any Given Location."
# toleranceLbsSy = allowed +/- deviation from the DESIGNATED spread rate (lbs/yd2).
# OGFC/PEM use the per-lot control window from the Table 12 note.
# ---------------------------------------------------------------------------
spreadTolerance:
  - id: TOLERANCE.BASE
    label: Base course
    toleranceLbsSy: 55
    note: Asphaltic concrete base course (also any combination of base + surface)
    tier: 1
    status: VERIFIED
  - id: TOLERANCE.INTERMEDIATE_WEARING
    label: Intermediate / wearing course
    toleranceLbsSy: 27.5
    note: Intermediate and/or wearing course
    tier: 1
    status: VERIFIED
  - id: TOLERANCE.OGFC
    label: OGFC (9.5 / 12.5 mm)
    toleranceLbsSy: 7
    note: Control spread rate per lot within 7 lbs/yd2 of the designated rate
    tier: 1
    status: VERIFIED
  - id: TOLERANCE.PEM
    label: 12.5 mm PEM
    toleranceLbsSy: 10
    note: Control spread rate per lot within 10 lbs/yd2 of the designated rate
    tier: 1
    status: VERIFIED

